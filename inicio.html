<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="inicio.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.0/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.16.2/xlsx.full.min.js"></script>
</head>

<body>
    <a href="login.html">
        <button id="botaoVoltar">&#8592; Trocar Conta</button>
    </a>
    <div class="quadrado"></div>
    <div class="container">
        <img src="background.jpg" alt="fundo">
    </div>

    <div class="login-container">
        <button id="loginButton" onclick="window.location.href='formulario.html'">Começar a vender &#8594</button>
        <button id="visualizarButton" onclick="window.location.href='vendas.html'">Visualizar vendas &#8594</button>
        <button id="imprimirButton" onclick="baixarArquivo()">Imprimir vendas &#8594</button>
    </div>

    <script>
        function baixarArquivo() {
            const dadosExistentes = localStorage.getItem('dadosVendas');
            if (dadosExistentes) {
                const workbook = XLSX.read(dadosExistentes, { type: 'base64' });
                XLSX.writeFile(workbook, 'dadosVendas.xlsx');
            } else {
                alert('Nenhum dado encontrado para download.');
            }
        }
    </script>
</body>

</html>
